name: Supabase Keep-Alive

# Supabase free-tier projects are paused after 7 days with no activity.
# This job pings the database on a schedule so it never goes idle long
# enough to be paused. It performs a real PostgREST read against the
# `settings` table, which counts as genuine database activity.

on:
  schedule:
    # Runs every day at 07:00 UTC. Daily (well under the 7-day window)
    # keeps the project warm even if an occasional run is skipped.
    - cron: "0 7 * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          status=$(curl -sS -o /dev/null -w '%{http_code}' \
            "${SUPABASE_URL}/rest/v1/settings?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "HTTP status: ${status}"
          if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
            echo "::error::Supabase keep-alive ping failed with status ${status}"
            exit 1
          fi
          echo "Supabase keep-alive ping succeeded."
